spring:
  application:
    name: root-therapy-backend

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
#      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always

server:
  port: 8080

  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: lax

app:
  uploads:
    directory: ${UPLOAD_DIRECTORY:backend/uploads}
    max-file-size: 5MB