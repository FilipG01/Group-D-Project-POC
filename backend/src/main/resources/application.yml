spring:
  application:
    name: root-therapy-backend

  config:
    import:
      optional:file:backend/.env[.properties]

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
#      ddl-auto: validate
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  session:
    store-type: jdbc
    jdbc:
      initialize-schema: always

server:
  port: 8080

  servlet:
    session:
      cookie:
        http-only: true
        secure: false
        same-site: lax